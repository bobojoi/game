<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>泡泡毛毛蟲挑戰</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#060c14;overflow:hidden;width:100vw;height:100vh;touch-action:none;user-select:none;font-family:sans-serif;}
#wrap{position:relative;width:100vw;height:100vh;}
canvas{position:absolute;top:0;left:0;width:100%;height:100%;}
#hud{position:absolute;top:6px;left:0;width:100%;display:flex;justify-content:space-around;pointer-events:none;padding:0 6px;gap:4px;z-index:2;}
.hp{background:rgba(0,0,0,0.7);border:1px solid rgba(255,255,255,0.15);border-radius:8px;padding:5px 8px;color:rgba(255,255,255,0.6);font-size:11px;text-align:center;flex:1;}
.hp b{color:#7ee8ff;font-size:14px;display:block;}
#tbar{position:absolute;top:0;left:0;height:4px;z-index:3;transition:width 0.15s;}
#msg{position:absolute;bottom:12px;left:0;width:100%;text-align:center;color:rgba(255,255,255,0.4);font-size:12px;pointer-events:none;z-index:2;}
#bkhint{position:absolute;top:42%;left:50%;transform:translate(-50%,-50%);background:rgba(150,20,20,0.95);border-radius:12px;padding:12px 18px;color:white;font-size:13px;font-weight:700;text-align:center;pointer-events:none;display:none;z-index:5;line-height:1.7;}
#ov{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(6,12,20,0.94);z-index:10;padding:20px;}
.icon{font-size:52px;margin-bottom:12px;}
.ov-h2{color:white;font-size:20px;font-weight:700;margin-bottom:8px;text-align:center;}
.ov-p{color:rgba(255,255,255,0.5);font-size:13px;margin-bottom:20px;text-align:center;line-height:1.8;}
.lvls{display:flex;gap:8px;margin-bottom:16px;}
.lvl{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.2);border-radius:10px;padding:10px 12px;cursor:pointer;color:white;font-size:13px;font-weight:700;text-align:center;min-width:70px;}
.lvl.sel{background:rgba(74,184,245,0.25);border-color:#4ab8f5;}
.lvl small{display:block;color:rgba(255,255,255,0.4);font-size:10px;margin-top:3px;font-weight:400;}
.btn{background:transparent;border:1px solid rgba(255,255,255,0.35);color:white;padding:11px 28px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;margin:4px;font-family:sans-serif;width:240px;text-align:center;text-decoration:none;display:block;}
.btn-pink{background:linear-gradient(135deg,#ff6bcd,#ff3399);border:none;color:white;}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <div id="tbar" style="width:100%;background:#4ab8f5;"></div>
  <div id="hud">
    <div class="hp"><b id="hC">0</b>串</div>
    <div class="hp"><b id="hT">--</b>秒</div>
    <div class="hp"><b id="hW">0</b>/<b id="hM">0</b><br>重</div>
    <div class="hp"><b id="hL">0</b>剩</div>
  </div>
  <div id="bkhint">❌ 黏錯了！<br>點紅色泡泡移除</div>
  <div id="msg">把泡泡拖到棒子下方黏上去，由大到小</div>
  <div id="ov" id="ov">
    <div class="icon">🫧</div>
    <div class="ov-h2">泡泡毛毛蟲挑戰</div>
    <div class="ov-p">像大師蘇仲太一樣串成毛毛蟲！<br>由大到小，黏錯會卡住，超重會掉落</div>
    <div class="lvls" style="flex-wrap:wrap;max-width:320px;justify-content:center;">
      <div class="lvl sel" id="lv0" onclick="selLv(0)">入門<small>5顆/30秒</small></div>
      <div class="lvl" id="lv1" onclick="selLv(1)">達人<small>8顆/25秒</small></div>
      <div class="lvl" id="lv2" onclick="selLv(2)">大師<small>12顆/20秒</small></div>
      <div class="lvl" id="lv3" onclick="selLv(3)" style="border-color:rgba(255,180,0,0.6);color:#ffd700;">傳奇<small>20顆/15秒</small></div>
    </div>
    <button class="btn" onclick="startGame()">開始挑戰 →</button>
  </div>
</div>
<script>
var cv = document.getElementById('c');
var ctx = cv.getContext('2d');
var W, H;
var wand, chain, floating, drag;
var state = 'idle';
var tLeft, tMax, lv, raf, lastT;
var shake = 0, blocked = false, sel = 0;

var LV = [
  { time:30, sizes:[46,38,30,22,14], maxW:160 },
  { time:25, sizes:[46,42,36,30,24,18,12,8], maxW:240 },
  { time:20, sizes:[46,42,38,34,30,26,22,18,14,12,10,8], maxW:330 },
  { time:15, sizes:[46,44,42,40,38,36,34,32,30,28,26,24,22,20,18,16,14,12,10,8], maxW:520 }
];

function selLv(i) {
  sel = i;
  for (var j = 0; j < 4; j++) {
    var el = document.getElementById('lv' + j);
    if (el) el.className = 'lvl' + (j === i ? ' sel' : '');
  }
}

function resize() {
  W = cv.width = window.innerWidth;
  H = cv.height = window.innerHeight;
}

function startGame() {
  document.getElementById('ov').style.display = 'none';
  resize();
  lv = LV[sel];
  wand = { x: W/2, y: 65, w: Math.min(110, W * 0.3), h: 13 };
  chain = []; floating = []; drag = null;
  shake = 0; blocked = false;
  tLeft = lv.time; tMax = lv.time;
  state = 'playing';
  setBlocked(false);
  document.getElementById('hM').textContent = lv.maxW;

  var hues = [195, 215, 235, 255, 270, 180, 160, 140, 120, 100, 80, 60];
  for (var i = 0; i < lv.sizes.length; i++) {
    var r = lv.sizes[i];
    floating.push({
      id: i, r: r, hue: hues[i % hues.length],
      x: r + 15 + Math.random() * (W - r*2 - 30),
      y: H * 0.38 + Math.random() * (H * 0.5),
      vx: (Math.random() - 0.5) * 0.9,
      vy: (Math.random() - 0.5) * 0.9,
      wrong: false
    });
  }
  updateHUD();
  lastT = null;
  cancelAnimationFrame(raf);
  raf = requestAnimationFrame(loop);
}

function getLoad() {
  var s = 0;
  for (var i = 0; i < chain.length; i++) s += chain[i].r;
  return s;
}

function getBubbleY(idx) {
  var totalH = 0;
  for (var i = 0; i < chain.length; i++) totalH += chain[i].r * 2 + 4;
  var availH = H - wand.y - wand.h/2 - 45;
  var scale = (totalH > availH) ? (availH / totalH) : 1;
  var y = wand.y + wand.h/2 + 6;
  for (var i = 0; i < idx; i++) y += (chain[i].r * 2 + 4) * scale;
  y += chain[idx].r * scale;
  return y;
}

function setBlocked(v) {
  blocked = v;
  document.getElementById('bkhint').style.display = v ? 'block' : 'none';
}

function tryAttach(b) {
  if (getLoad() + b.r > lv.maxW) {
    showMsg('超過承載力！💥', 'warn');
    doBreak();
    putBack(b);
    return;
  }
  b.wrong = (chain.length > 0 && b.r > chain[chain.length-1].r);
  chain.push(b);
  b.grabbed = false;
  drag = null;
  if (b.wrong) {
    setBlocked(true);
    showMsg('黏錯了！點紅色泡泡移除', 'warn');
  } else {
    setBlocked(false);
    if (floating.length === 0 && !drag) checkWin();
  }
  updateHUD();
}

function removeLast() {
  if (!blocked || chain.length === 0) return;
  var b = chain.pop();
  b.wrong = false;
  b.x = wand.x + (Math.random() - 0.5) * 120;
  b.y = H * 0.45 + Math.random() * (H * 0.35);
  b.vx = (Math.random() - 0.5) * 1.2;
  b.vy = (Math.random() - 0.5) * 1.2;
  floating.push(b);
  setBlocked(false);
  updateHUD();
  showMsg('移除成功！繼續黏 ✅', 'ok');
}

function doBreak() {
  shake = 18;
  if (chain.length > 1) {
    var di = Math.max(1, Math.floor(chain.length * 0.5));
    var dropped = chain.splice(di);
    for (var i = 0; i < dropped.length; i++) {
      var b = dropped[i];
      b.x = wand.x + (Math.random() - 0.5) * 80;
      b.y = H * 0.3;
      b.vx = (Math.random() - 0.5) * 3;
      b.vy = 2 + Math.random() * 2;
      b.wrong = false;
      floating.push(b);
    }
  }
  setBlocked(false);
  updateHUD();
}

function putBack(b) {
  b.x = b.r + 15 + Math.random() * (W - b.r*2 - 30);
  b.y = H * 0.4 + Math.random() * (H * 0.45);
  b.vx = (Math.random() - 0.5) * 0.9;
  b.vy = (Math.random() - 0.5) * 0.9;
  b.grabbed = false;
  b.wrong = false;
  floating.push(b);
  drag = null;
  updateHUD();
}

function showMsg(t, type) {
  var el = document.getElementById('msg');
  el.textContent = t;
  el.style.color = type === 'warn' ? '#ff9a7e' : type === 'ok' ? '#7ee8ff' : 'rgba(255,255,255,0.4)';
  clearTimeout(el._t);
  el._t = setTimeout(function() {
    el.textContent = '把泡泡拖到棒子下方黏上去，由大到小';
    el.style.color = 'rgba(255,255,255,0.4)';
  }, 2500);
}

function updateHUD() {
  document.getElementById('hC').textContent = chain.length;
  var w = Math.round(getLoad());
  document.getElementById('hW').textContent = w;
  document.getElementById('hL').textContent = floating.length + (drag ? 1 : 0);
  var p = getLoad() / lv.maxW;
  document.getElementById('hW').style.color = p > 0.85 ? '#ff9a7e' : p > 0.65 ? '#ffe066' : '#7ee8ff';
}

function checkWin() {
  state = 'won';
  var used = tMax - tLeft;
  var rank = used <= tMax * 0.4 ? '🏆' : used <= tMax * 0.7 ? '⭐' : '🫧';
  var rtitle = used <= tMax * 0.4 ? '大師！' : used <= tMax * 0.7 ? '高手！' : '完成！';
  showOv(rank, rtitle, '串起 ' + chain.length + ' 顆泡泡！用時 ' + Math.round(used) + ' 秒<br>大師蘇仲太的紀錄是 87 顆 🫧');
}

function timeUp() {
  state = 'over';
  showOv('⏰', '時間到！', '串了 ' + chain.length + ' 顆，還剩 ' + (floating.length + (drag ? 1 : 0)) + ' 顆<br>大師蘇仲太 20 秒可以串 87 顆！');
}

function showOv(icon, title, desc) {
  var ov = document.getElementById('ov');
  var html = '<div class="icon">' + icon + '</div>';
  html += '<div class="ov-h2">' + title + '</div>';
  html += '<div class="ov-p">' + desc + '</div>';
  html += '<a href="https://bobojoi.com/blog/bubble-art-summer-camp-2025" target="_blank" class="btn btn-pink">🎈 了解暑期夏令營</a>';
  html += '<button class="btn" onclick="resetGame()">再挑戰</button>';
  ov.innerHTML = html;
  ov.style.display = 'flex';
}

function resetGame() {
  var ov = document.getElementById('ov');
  var html = '<div class="icon">🫧</div>';
  html += '<div class="ov-h2">泡泡毛毛蟲挑戰</div>';
  html += '<div class="ov-p">像大師蘇仲太一樣串成毛毛蟲！<br>由大到小，黏錯會卡住，超重會掉落</div>';
  html += '<div class="lvls">';
  var lvNames = ['入門', '達人', '大師', '傳奇'];
  var lvDesc = ['5顆/30秒', '8顆/25秒', '12顆/20秒', '20顆/15秒'];
  for (var i = 0; i < 4; i++) {
    html += '<div class="lvl' + (i === sel ? ' sel' : '') + '" id="lv' + i + '" onclick="selLv(' + i + ')">';
    html += lvNames[i] + '<small>' + lvDesc[i] + '</small></div>';
  }
  html += '</div>';
  html += '<button class="btn" onclick="startGame()">開始挑戰 →</button>';
  ov.innerHTML = html;
  ov.style.display = 'flex';
  state = 'idle';
}

function drawBubble(b, x, y, alpha) {
  var r = b.r;
  ctx.save();
  ctx.globalAlpha = (alpha !== undefined) ? alpha : 1;
  var h = b.wrong ? 5 : b.hue;
  var g = ctx.createRadialGradient(x - r*0.3, y - r*0.3, r*0.04, x, y, r);
  g.addColorStop(0, 'rgba(255,255,255,0.92)');
  g.addColorStop(0.25, 'hsla(' + h + ',70%,82%,0.45)');
  g.addColorStop(0.75, 'hsla(' + h + ',65%,60%,0.12)');
  g.addColorStop(1, 'hsla(' + h + ',60%,50%,0.45)');
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fillStyle = g; ctx.fill();
  ctx.strokeStyle = b.wrong ? 'rgba(255,60,60,0.95)' : 'hsla(' + h + ',70%,85%,0.7)';
  ctx.lineWidth = b.wrong ? 3 : 1.5;
  ctx.stroke();
  if (b.wrong) {
    ctx.strokeStyle = 'rgba(255,60,60,0.3)';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(x, y, r + 5, 0, Math.PI * 2); ctx.stroke();
  }
  ctx.beginPath(); ctx.arc(x - r*0.28, y - r*0.3, r*0.17, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,255,255,0.75)'; ctx.fill();
  if (r >= 10) {
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.font = 'bold ' + Math.max(9, Math.round(r * 0.38)) + 'px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(r, x, y);
  }
  ctx.restore();
}

function drawWand() {
  ctx.save();
  if (shake > 0) { ctx.translate((Math.random() - 0.5) * shake * 0.4, 0); shake--; }
  var gw = ctx.createLinearGradient(wand.x - wand.w/2, 0, wand.x + wand.w/2, 0);
  gw.addColorStop(0, '#8a5c00');
  gw.addColorStop(0.5, '#ffd700');
  gw.addColorStop(1, '#8a5c00');
  ctx.beginPath();
  ctx.rect(wand.x - wand.w/2, wand.y - wand.h/2, wand.w, wand.h);
  ctx.fillStyle = gw; ctx.fill();
  ctx.strokeStyle = 'rgba(255,215,0,0.5)'; ctx.lineWidth = 1; ctx.stroke();
  var lp = Math.min(getLoad() / lv.maxW, 1);
  var bx = wand.x - wand.w/2, by = wand.y + wand.h/2 + 2;
  ctx.fillStyle = 'rgba(255,255,255,0.1)'; ctx.fillRect(bx, by, wand.w, 5);
  ctx.fillStyle = lp > 0.85 ? '#ff4444' : lp > 0.65 ? '#ffe066' : '#44ff99';
  ctx.fillRect(bx, by, wand.w * lp, 5);
  ctx.restore();
}

function loop(ts) {
  if (state !== 'playing') return;
  var dt = lastT ? Math.min((ts - lastT) / 1000, 0.05) : 0.016;
  lastT = ts;
  tLeft = Math.max(0, tLeft - dt);
  if (tLeft <= 0) { timeUp(); return; }

  var pct = tLeft / tMax;
  var tbar = document.getElementById('tbar');
  tbar.style.width = (pct * 100) + '%';
  tbar.style.background = pct < 0.3 ? '#ff4444' : pct < 0.6 ? '#ffe066' : '#4ab8f5';
  var hT = document.getElementById('hT');
  hT.textContent = Math.ceil(tLeft);
  hT.style.color = pct < 0.3 ? '#ff9a7e' : '#7ee8ff';

  ctx.clearRect(0, 0, W, H);
  var bg = ctx.createRadialGradient(W/2, H*0.3, 0, W/2, H*0.3, Math.max(W, H));
  bg.addColorStop(0, '#0d1f35'); bg.addColorStop(1, '#060c14');
  ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = 'rgba(255,255,255,0.18)';
  for (var i = 0; i < 40; i++) {
    ctx.beginPath();
    ctx.arc((i*137.5) % W, (i*89.3) % H, 0.7, 0, Math.PI*2);
    ctx.fill();
  }

  drawWand();

  if (chain.length > 0) {
    ctx.save();
    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
    ctx.lineWidth = 1;
    ctx.setLineDash([3, 3]);
    ctx.beginPath();
    ctx.moveTo(wand.x, wand.y + wand.h/2);
    for (var i = 0; i < chain.length; i++) ctx.lineTo(wand.x, getBubbleY(i));
    ctx.stroke();
    ctx.restore();
    for (var i = 0; i < chain.length; i++) {
      var b = chain[i];
      var tx = wand.x, ty = getBubbleY(i);
      b.x = b.x + (tx - b.x) * 0.2;
      b.y = b.y + (ty - b.y) * 0.2;
      drawBubble(b, b.x, b.y);
    }
  }

  var minY = wand.y + wand.h/2 + 55;
  for (var i = 0; i < floating.length; i++) {
    var b = floating[i];
    b.x += b.vx; b.y += b.vy;
    if (b.x - b.r < 0 || b.x + b.r > W) b.vx *= -1;
    if (b.y - b.r < minY || b.y + b.r > H - 12) b.vy *= -1;
    b.x = Math.max(b.r, Math.min(W - b.r, b.x));
    b.y = Math.max(minY + b.r, Math.min(H - 12 - b.r, b.y));
    drawBubble(b, b.x, b.y);
  }

  if (drag) drawBubble(drag, drag.dx, drag.dy, 0.8);

  updateHUD();
  raf = requestAnimationFrame(loop);
}

function getPtr(e) {
  var r = cv.getBoundingClientRect();
  var sx = W / r.width, sy = H / r.height;
  var src = e.touches ? e.touches[0] : e;
  return { x: (src.clientX - r.left) * sx, y: (src.clientY - r.top) * sy };
}

function onDown(e) {
  if (state !== 'playing') return;
  e.preventDefault();
  var p = getPtr(e);

  // blocked狀態：只能點最後一顆紅泡泡移除，其他什麼都不做
  if (blocked) {
    if (chain.length > 0) {
      var last = chain[chain.length - 1];
      var dx = p.x - last.x, dy = p.y - last.y;
      if (Math.sqrt(dx*dx + dy*dy) < last.r + 22) {
        removeLast();
      }
    }
    return; // blocked時無論如何都return，不抓浮動泡泡
  }

  // 正常狀態：只從 floating 陣列裡抓泡泡，chain上的泡泡完全忽略
  for (var i = floating.length - 1; i >= 0; i--) {
    var b = floating[i];
    var dx = p.x - b.x, dy = p.y - b.y;
    if (Math.sqrt(dx*dx + dy*dy) < b.r + 14) {
      drag = b; drag.dx = b.x; drag.dy = b.y;
      floating.splice(i, 1);
      updateHUD(); return;
    }
  }
  // 沒點到任何浮動泡泡 → 什麼都不做，不動chain
}

function onMove(e) {
  if (!drag) return;
  e.preventDefault();
  var p = getPtr(e);
  drag.dx = p.x; drag.dy = p.y;
}

function onUp(e) {
  if (!drag) return;
  e.preventDefault();
  var p = getPtr(e);
  var inX = Math.abs(p.x - wand.x) < wand.w/2 + drag.r + 40;
  var inY = p.y < H * 0.72;
  if (inX && inY) tryAttach(drag);
  else putBack(drag);
}

cv.addEventListener('mousedown', onDown);
cv.addEventListener('mousemove', onMove);
cv.addEventListener('mouseup', onUp);
cv.addEventListener('touchstart', onDown, { passive: false });
cv.addEventListener('touchmove', onMove, { passive: false });
cv.addEventListener('touchend', onUp, { passive: false });
window.addEventListener('resize', function() { if (state === 'playing') resize(); });
</script>
</body>
</html>
