<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>泡泡大師訓練所 🫧</title>
<style>
@import url("https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&family=Noto+Sans+TC:wght@400;700;900&display=swap");
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Noto Sans TC","Nunito",sans-serif;background:#060e1c;overflow:hidden;width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;touch-action:none;user-select:none;}
canvas{display:block;position:fixed;top:0;left:0;}
#hud{position:fixed;top:14px;left:0;width:100%;display:none;justify-content:center;gap:18px;z-index:20;pointer-events:none;}
.hud-pill{background:rgba(255,255,255,0.09);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.15);border-radius:99px;padding:5px 16px;color:white;font-size:13px;font-weight:700;}
.hud-pill span{color:#7ee8ff;font-weight:900;}
.screen{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:30;padding:24px;}
#startScreen{background:radial-gradient(ellipse at 50% 55%,#0d2340 0%,#060e1c 100%);}
#startScreen .big{font-size:72px;margin-bottom:12px;animation:breathe 3s ease-in-out infinite;display:block;}
@keyframes breathe{0%,100%{transform:scale(1);}50%{transform:scale(1.1);}}
#startScreen h1{font-size:clamp(26px,7vw,42px);font-weight:900;color:white;text-align:center;line-height:1.2;margin-bottom:8px;text-shadow:0 0 40px rgba(74,184,245,0.5);}
#startScreen .sub{color:rgba(255,255,255,0.45);font-size:14px;text-align:center;margin-bottom:32px;line-height:1.9;}
.btn-go{background:linear-gradient(135deg,#4ab8f5,#1a6fa8);color:white;border:none;border-radius:20px;padding:17px 48px;font-size:18px;font-weight:900;font-family:"Noto Sans TC",sans-serif;cursor:pointer;box-shadow:0 0 40px rgba(74,184,245,0.45);transition:all 0.2s;}
.btn-go:hover{transform:translateY(-3px);}
#resultScreen{background:radial-gradient(ellipse at 50% 55%,#0d2340 0%,#060e1c 100%);display:none;}
.rank-badge{font-size:64px;margin-bottom:6px;animation:popIn 0.5s cubic-bezier(.34,1.56,.64,1);}
@keyframes popIn{0%{transform:scale(0);}100%{transform:scale(1);}}
.rank-name{font-size:19px;font-weight:900;color:#7ee8ff;margin-bottom:4px;}
.result-title{font-size:24px;font-weight:900;color:white;margin-bottom:4px;}
.score-line{color:rgba(255,255,255,0.45);font-size:13px;margin-bottom:22px;}
.camp-box{background:rgba(255,255,255,0.06);border:1px solid rgba(74,184,245,0.25);border-radius:20px;padding:18px 20px;max-width:340px;width:100%;margin-bottom:18px;text-align:left;}
.camp-box .tag{background:#ff6bcd;color:white;font-size:11px;font-weight:900;letter-spacing:1px;padding:3px 10px;border-radius:99px;display:inline-block;margin-bottom:10px;}
.camp-box h3{font-size:15px;font-weight:900;color:white;margin-bottom:8px;line-height:1.5;}
.camp-box p{font-size:12px;color:rgba(255,255,255,0.5);line-height:1.9;}
.camp-box p strong{color:#7ee8ff;}
.btn-cta{display:block;width:100%;max-width:340px;background:linear-gradient(135deg,#ff6bcd,#ff3399);color:white;border:none;border-radius:16px;padding:16px;font-size:16px;font-weight:900;font-family:"Noto Sans TC",sans-serif;cursor:pointer;text-align:center;text-decoration:none;box-shadow:0 0 36px rgba(255,107,205,0.4);transition:all 0.2s;margin-bottom:10px;}
.btn-cta:hover{transform:translateY(-2px);}
.btn-retry{background:transparent;color:rgba(255,255,255,0.5);border:1.5px solid rgba(255,255,255,0.18);border-radius:14px;padding:11px 28px;font-size:14px;font-weight:700;font-family:"Noto Sans TC",sans-serif;cursor:pointer;transition:all 0.2s;}
.btn-retry:hover{background:rgba(255,255,255,0.07);}
#joyzone{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.25);font-size:12px;font-weight:700;letter-spacing:1px;z-index:20;pointer-events:none;display:none;text-align:center;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <div class="hud-pill">⏱ <span id="timerEl">0.0</span>s</div>
  <div class="hud-pill">🏅 最高 <span id="bestEl">0.0</span>s</div>
  <div class="hud-pill">⚡ <span id="lvlEl">Lv1</span></div>
</div>
<div id="joyzone">拖曳任意處控制方向</div>
<div class="screen" id="startScreen">
  <span class="big">🫧</span>
  <h1>泡泡大師<br>訓練所</h1>
  <p class="sub">手指拖曳控制泡泡方向<br>閃避尖刺，時間越長越難！</p>
  <button class="btn-go" onclick="startGame()">開始挑戰 →</button>
</div>
<div class="screen" id="resultScreen">
  <div class="rank-badge" id="rankBadge"></div>
  <div class="rank-name" id="rankName"></div>
  <div class="result-title" id="resultTitle"></div>
  <div class="score-line" id="scoreLine"></div>
  <div class="camp-box">
    <div class="tag">🎈 2026 暑假限定</div>
    <h3>泡藝夏令營 × 科教館<br>蘇仲太大師親自教學！</h3>
    <p><strong>第一梯次｜</strong>7/20(一)～7/24(五)<br><strong>第二梯次｜</strong>8/17(一)～8/21(五)<br>📍 國立臺灣科學教育館｜小班制</p>
  </div>
  <a class="btn-cta" href="https://bobojoi.com/blog/bubble-art-summer-camp-2025" target="_blank">🫧 了解夏令營 →</a>
  <button class="btn-retry" onclick="restartGame()">再挑戰一次</button>
</div>
<script>
const canvas=document.getElementById("c");
const ctx=canvas.getContext("2d");
let W,H;
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
resize();window.addEventListener("resize",resize);

let state="idle",gameTime=0,bestTime=0,lastTime=0;
let player,obstacles=[],bgBubbles=[],particles=[],spawTimer=0;
let touch={active:false,sx:0,sy:0,cx:0,cy:0};
const keys={up:false,down:false,left:false,right:false};

document.addEventListener("keydown",e=>{
  if(e.key==="ArrowUp"||e.key==="w"){keys.up=true;e.preventDefault();}
  if(e.key==="ArrowDown"||e.key==="s"){keys.down=true;e.preventDefault();}
  if(e.key==="ArrowLeft"||e.key==="a"){keys.left=true;e.preventDefault();}
  if(e.key==="ArrowRight"||e.key==="d"){keys.right=true;e.preventDefault();}
});
document.addEventListener("keyup",e=>{
  if(e.key==="ArrowUp"||e.key==="w")keys.up=false;
  if(e.key==="ArrowDown"||e.key==="s")keys.down=false;
  if(e.key==="ArrowLeft"||e.key==="a")keys.left=false;
  if(e.key==="ArrowRight"||e.key==="d")keys.right=false;
});

canvas.addEventListener("touchstart",e=>{if(state!=="playing")return;e.preventDefault();const t=e.touches[0];touch.active=true;touch.sx=t.clientX;touch.sy=t.clientY;touch.cx=t.clientX;touch.cy=t.clientY;},{passive:false});
canvas.addEventListener("touchmove",e=>{if(!touch.active)return;e.preventDefault();const t=e.touches[0];touch.cx=t.clientX;touch.cy=t.clientY;},{passive:false});
canvas.addEventListener("touchend",e=>{touch.active=false;},{passive:false});
canvas.addEventListener("touchcancel",e=>{touch.active=false;},{passive:false});
let mouseDown=false;
canvas.addEventListener("mousedown",e=>{if(state!=="playing")return;mouseDown=true;touch.active=true;touch.sx=e.clientX;touch.sy=e.clientY;touch.cx=e.clientX;touch.cy=e.clientY;});
canvas.addEventListener("mousemove",e=>{if(!mouseDown)return;touch.cx=e.clientX;touch.cy=e.clientY;});
canvas.addEventListener("mouseup",()=>{mouseDown=false;touch.active=false;});

function initBgBubbles(){bgBubbles=[];for(let i=0;i<20;i++)bgBubbles.push({x:Math.random()*W,y:Math.random()*H,r:8+Math.random()*44,vx:(Math.random()-.5)*.25,vy:-.15-Math.random()*.45,alpha:.04+Math.random()*.07,hue:180+Math.random()*70});}

function startGame(){
  document.getElementById("startScreen").style.display="none";
  document.getElementById("resultScreen").style.display="none";
  document.getElementById("hud").style.display="flex";
  document.getElementById("joyzone").style.display="block";
  initBgBubbles();
  player={x:W/2,y:H/2,r:26,vx:0,vy:0,hue:0,wobble:0};
  obstacles=[];particles=[];spawTimer=0;gameTime=0;
  touch.active=false;keys.up=keys.down=keys.left=keys.right=false;
  state="playing";lastTime=performance.now();
  requestAnimationFrame(loop);
}
function restartGame(){document.getElementById("resultScreen").style.display="none";startGame();}

function difficulty(){return Math.min(1+gameTime/25,5);}
function spawInterval(){return Math.max(0.25,1.4-gameTime*.038);}
function obstacleSpeed(){return(1.6+gameTime*.12)*Math.sqrt(difficulty())*.7;}

function spawnObstacle(){
  const side=Math.floor(Math.random()*4);
  let x,y,vx,vy;
  const spd=obstacleSpeed(),spread=.5+difficulty()*.35;
  if(side===0){x=Math.random()*W;y=-50;vx=(Math.random()-.5)*spread*2;vy=spd;}
  else if(side===1){x=W+50;y=Math.random()*H;vx=-spd;vy=(Math.random()-.5)*spread*2;}
  else if(side===2){x=Math.random()*W;y=H+50;vx=(Math.random()-.5)*spread*2;vy=-spd;}
  else{x=-50;y=Math.random()*H;vx=spd;vy=(Math.random()-.5)*spread*2;}
  const types=["spike","ring","spike","needle","spike"];
  const homing=gameTime>12&&Math.random()<.28;
  obstacles.push({x,y,vx,vy,type:types[Math.floor(Math.random()*types.length)],r:13+Math.random()*5,spin:0,spinSpeed:(Math.random()-.5)*.1,homing,homingStrength:.013});
}

function popParticles(x,y,hue){for(let i=0;i<26;i++){const a=Math.random()*Math.PI*2,spd=1.5+Math.random()*6;particles.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,r:2+Math.random()*7,alpha:1,hue:hue+Math.random()*40-20,life:1});}}

function drawBubble(x,y,r,alpha,hue){
  ctx.save();ctx.globalAlpha=alpha;
  const g=ctx.createRadialGradient(x-r*.32,y-r*.32,r*.04,x,y,r);
  g.addColorStop(0,"rgba(255,255,255,0.92)");
  g.addColorStop(.25,"hsla("+hue+",75%,82%,0.4)");
  g.addColorStop(.7,"hsla("+hue+",65%,60%,0.1)");
  g.addColorStop(1,"hsla("+hue+",60%,50%,0.38)");
  ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
  ctx.strokeStyle="hsla("+hue+",70%,88%,"+(0.55*alpha)+")";ctx.lineWidth=1.5;ctx.stroke();
  ctx.beginPath();ctx.arc(x-r*.28,y-r*.3,r*.17,0,Math.PI*2);ctx.fillStyle="rgba(255,255,255,0.82)";ctx.fill();
  ctx.restore();
}

function drawSpike(x,y,r,spin,color){
  ctx.save();ctx.translate(x,y);ctx.rotate(spin);
  ctx.beginPath();
  for(let i=0;i<8;i++){const a=i*(Math.PI*2/8);ctx.lineTo(Math.cos(a)*(r+6),Math.sin(a)*(r+6));const a2=a+Math.PI/8;ctx.lineTo(Math.cos(a2)*3,Math.sin(a2)*3);}
  ctx.closePath();ctx.fillStyle=color||"rgba(255,75,110,0.88)";ctx.strokeStyle="rgba(255,160,180,0.8)";ctx.lineWidth=1;ctx.fill();ctx.stroke();ctx.restore();
}
function drawRing(x,y,r,spin){
  ctx.save();ctx.translate(x,y);ctx.rotate(spin);ctx.beginPath();
  for(let i=0;i<14;i++){const a=i*(Math.PI*2/14),spike=i%2===0?r+9:r-2;ctx.lineTo(Math.cos(a)*spike,Math.sin(a)*spike);}
  ctx.closePath();ctx.strokeStyle="rgba(255,210,50,0.92)";ctx.lineWidth=2.5;ctx.stroke();ctx.fillStyle="rgba(255,200,40,0.1)";ctx.fill();
  ctx.beginPath();ctx.arc(0,0,r*.42,0,Math.PI*2);ctx.strokeStyle="rgba(255,210,50,0.4)";ctx.lineWidth=1.5;ctx.stroke();ctx.restore();
}
function drawNeedle(x,y,r,spin){
  ctx.save();ctx.translate(x,y);ctx.rotate(spin);ctx.beginPath();
  ctx.moveTo(0,-(r+8));ctx.lineTo(4,r*.5);ctx.lineTo(0,r);ctx.lineTo(-4,r*.5);ctx.closePath();
  ctx.fillStyle="rgba(120,200,255,0.85)";ctx.strokeStyle="rgba(180,230,255,0.8)";ctx.lineWidth=1;ctx.fill();ctx.stroke();ctx.restore();
}

function drawJoystick(){
  if(!touch.active)return;
  const maxR=55,dx=touch.cx-touch.sx,dy=touch.cy-touch.sy;
  const dist=Math.sqrt(dx*dx+dy*dy);
  const kx=touch.sx+Math.min(dist,maxR)*(dist>0?dx/dist:0);
  const ky=touch.sy+Math.min(dist,maxR)*(dist>0?dy/dist:0);
  ctx.save();ctx.globalAlpha=.18;ctx.beginPath();ctx.arc(touch.sx,touch.sy,maxR,0,Math.PI*2);ctx.strokeStyle="white";ctx.lineWidth=2;ctx.stroke();ctx.restore();
  ctx.save();ctx.globalAlpha=.42;ctx.beginPath();ctx.arc(kx,ky,20,0,Math.PI*2);ctx.fillStyle="white";ctx.fill();ctx.restore();
}

function loop(ts){
  if(state!=="playing")return;
  const dt=Math.min((ts-lastTime)/1000,.05);lastTime=ts;gameTime+=dt;spawTimer+=dt;
  if(spawTimer>=spawInterval()){
    spawTimer=0;spawnObstacle();
    if(difficulty()>1.8)spawnObstacle();
    if(difficulty()>3.2)spawnObstacle();
  }
  const ACCEL=.55;
  if(touch.active){
    const dx=touch.cx-touch.sx,dy=touch.cy-touch.sy;
    const dist=Math.sqrt(dx*dx+dy*dy)||1;
    const power=Math.min(dist/55,1);
    player.vx+=(dx/dist)*ACCEL*power*1.8;
    player.vy+=(dy/dist)*ACCEL*power*1.8;
  }
  if(keys.up)player.vy-=ACCEL;
  if(keys.down)player.vy+=ACCEL;
  if(keys.left)player.vx-=ACCEL;
  if(keys.right)player.vx+=ACCEL;
  player.vx*=.87;player.vy*=.87;
  const spd=Math.sqrt(player.vx*player.vx+player.vy*player.vy),maxS=11;
  if(spd>maxS){player.vx=player.vx/spd*maxS;player.vy=player.vy/spd*maxS;}
  player.x+=player.vx;player.y+=player.vy;
  player.hue=(player.hue+1.5)%360;player.wobble=(player.wobble+.08)%Math.PI;
  if(player.x-player.r<0){player.x=player.r;player.vx=Math.abs(player.vx)*.5;}
  if(player.x+player.r>W){player.x=W-player.r;player.vx=-Math.abs(player.vx)*.5;}
  if(player.y-player.r<0){player.y=player.r;player.vy=Math.abs(player.vy)*.5;}
  if(player.y+player.r>H){player.y=H-player.r;player.vy=-Math.abs(player.vy)*.5;}
  for(let i=obstacles.length-1;i>=0;i--){
    const o=obstacles[i];
    if(o.homing){const dx=player.x-o.x,dy=player.y-o.y,d=Math.sqrt(dx*dx+dy*dy)||1;o.vx+=dx/d*o.homingStrength*obstacleSpeed();o.vy+=dy/d*o.homingStrength*obstacleSpeed();}
    o.x+=o.vx;o.y+=o.vy;o.spin+=o.spinSpeed;
    if(o.x<-120||o.x>W+120||o.y<-120||o.y>H+120){obstacles.splice(i,1);continue;}
    const dx=player.x-o.x,dy=player.y-o.y,dist=Math.sqrt(dx*dx+dy*dy);
    const hitR=o.type==="ring"?o.r*.48:o.r+5;
    if(dist<player.r*.72+hitR*.72){
      popParticles(player.x,player.y,player.hue);state="dead";
      document.getElementById("hud").style.display="none";
      document.getElementById("joyzone").style.display="none";
      touch.active=false;
      if(gameTime>bestTime)bestTime=gameTime;
      setTimeout(showResult,800);break;
    }
  }
  for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.08;p.life-=.025;p.alpha=p.life;p.r*=.975;if(p.life<=0)particles.splice(i,1);}
  for(const b of bgBubbles){b.x+=b.vx;b.y+=b.vy;if(b.y+b.r<0){b.y=H+b.r;b.x=Math.random()*W;}}
  document.getElementById("timerEl").textContent=gameTime.toFixed(1);
  document.getElementById("bestEl").textContent=bestTime.toFixed(1);
  document.getElementById("lvlEl").textContent="Lv"+Math.min(Math.floor(1+gameTime/7)+1,10);
  ctx.clearRect(0,0,W,H);
  const bg=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H));
  bg.addColorStop(0,"#0d2340");bg.addColorStop(1,"#060e1c");ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  ctx.fillStyle="rgba(255,255,255,0.3)";
  for(let i=0;i<55;i++){ctx.beginPath();ctx.arc((i*137.5)%W,(i*97.3)%H,.5+((i*31)%3)*.45,0,Math.PI*2);ctx.fill();}
  for(const b of bgBubbles)drawBubble(b.x,b.y,b.r,b.alpha,b.hue);
  const vigA=Math.min((gameTime-8)/25,.6);
  if(vigA>0){const vig=ctx.createRadialGradient(W/2,H/2,H*.25,W/2,H/2,Math.max(W,H)*.8);vig.addColorStop(0,"transparent");vig.addColorStop(1,"rgba(200,30,60,"+vigA+")");ctx.fillStyle=vig;ctx.fillRect(0,0,W,H);}
  for(const o of obstacles){
    const c=o.homing?"rgba(255,160,40,0.9)":undefined;
    if(o.type==="ring")drawRing(o.x,o.y,o.r,o.spin);
    else if(o.type==="needle")drawNeedle(o.x,o.y,o.r,o.spin);
    else drawSpike(o.x,o.y,o.r,o.spin,c);
  }
  ctx.save();ctx.globalAlpha=.12;
  const gl=ctx.createRadialGradient(player.x,player.y,0,player.x,player.y,player.r*2.2);
  gl.addColorStop(0,"hsl("+player.hue+",80%,70%)");gl.addColorStop(1,"transparent");
  ctx.beginPath();ctx.arc(player.x,player.y,player.r*2.2,0,Math.PI*2);ctx.fillStyle=gl;ctx.fill();ctx.restore();
  drawBubble(player.x,player.y,player.r+Math.sin(player.wobble)*2,1,player.hue);
  for(const p of particles){ctx.save();ctx.globalAlpha=p.alpha;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle="hsl("+p.hue+",80%,70%)";ctx.fill();ctx.restore();}
  drawJoystick();
  requestAnimationFrame(loop);
}

function showResult(){
  const ranks=[{min:0,max:4,badge:"🫧",name:"泡泡新手",title:"泡泡破了！再試一次？"},{min:4,max:9,badge:"💨",name:"泡泡學徒",title:"還不錯的開始！"},{min:9,max:16,badge:"🌈",name:"泡泡達人",title:"你有泡泡天賦！"},{min:16,max:25,badge:"⭐",name:"泡泡高手",title:"控制力驚人！"},{min:25,max:999,badge:"🏆",name:"泡藝大師",title:"你就是下一個蘇仲太！"}];
  const r=ranks.find(r=>gameTime>=r.min&&gameTime<r.max)||ranks[0];
  document.getElementById("rankBadge").textContent=r.badge;
  document.getElementById("rankName").textContent=r.name;
  document.getElementById("resultTitle").textContent=r.title;
  document.getElementById("scoreLine").textContent="存活 "+gameTime.toFixed(1)+" 秒　最高紀錄 "+bestTime.toFixed(1)+" 秒";
  document.getElementById("resultScreen").style.display="flex";
}

function idleLoop(ts){
  if(state!=="idle")return;
  ctx.clearRect(0,0,W,H);
  const bg=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H));
  bg.addColorStop(0,"#0d2340");bg.addColorStop(1,"#060e1c");ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  ctx.fillStyle="rgba(255,255,255,0.3)";
  for(let i=0;i<55;i++){ctx.beginPath();ctx.arc((i*137.5)%W,(i*97.3)%H,.5+((i*31)%3)*.45,0,Math.PI*2);ctx.fill();}
  for(const b of bgBubbles){b.x+=b.vx;b.y+=b.vy;if(b.y+b.r<0){b.y=H+b.r;b.x=Math.random()*W;}drawBubble(b.x,b.y,b.r,b.alpha,b.hue);}
  requestAnimationFrame(idleLoop);
}
initBgBubbles();state="idle";requestAnimationFrame(idleLoop);
</script>
</body>
</html>
